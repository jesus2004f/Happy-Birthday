
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para ti 💌</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #ff758c, #ff7eb3);
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
}

/* TEXTO INICIAL */
.hint {
  position: absolute;
  top: 20px;
  color: white;
  font-size: 14px;
  opacity: 0.8;
}

/* SOBRE */
.envelope {
  width: 220px;
  height: 140px;
  background: #fff;
  position: relative;
  border-radius: 8px;
  cursor: pointer;
}

.envelope:before {
  content: "";
  position: absolute;
  top: 0;
  width: 0;
  height: 0;
  border-left: 110px solid transparent;
  border-right: 110px solid transparent;
  border-top: 70px solid #ff4d6d;
  transform-origin: top;
  transition: 0.6s;
}

.open:before {
  transform: rotateX(180deg);
}

/* CARTA */
.card {
  position: absolute;
  width: 85%;
  max-width: 350px;
  background: white;
  border-radius: 20px;
  padding: 20px;
  text-align: center;
  transform: scale(0);
  transition: 0.4s;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

.card.show {
  transform: scale(1);
}

h1 {
  color: #ff4d6d;
}

p {
  font-size: 14px;
  line-height: 1.5;
}

/* BOTONES */
button {
  margin-top: 10px;
  padding: 10px;
  border: none;
  background: #ff4d6d;
  color: white;
  border-radius: 10px;
  width: 100%;
}

/* CORAZONES */
.heart {
  position: fixed;
  bottom: 0;
  font-size: 20px;
  animation: subir 3s linear forwards;
}

@keyframes subir {
  to {
    transform: translateY(-100vh);
    opacity: 0;
  }
}
</style>
</head>

<body>

<div class="hint">Toca el sobre 💌</div>

<div class="envelope" onclick="abrir()"></div>

<div class="card" id="card">
  <h1>Feliz cumpleaños🎂</h1>

  <p id="mensaje"></p>

  <button onclick="corazones()">💖 Presiona aquí</button>
  <button onclick="secreto()">👀 Mensaje secreto</button>
</div>

<audio id="music" src="music.mp3"></audio>

<script>
const nombre = "Carmen";

const texto = `Hoy cierras un capítulo más y comienzas uno nuevo en tu vida.

No importa la cantidad de años que cumplas, sino la calidad con la que vives.

No apresures el tiempo, disfruta cada momento.

Feliz vuelta al sol 🌞

Hoy celebras tus 18 años 🎂

Te mando un fuerte abrazo a la distancia 💛`;

function abrir() {
  document.querySelector(".envelope").classList.add("open");
  document.getElementById("card").classList.add("show");

  escribir();

  let audio = document.getElementById("music");
  audio.play();

  if (navigator.vibrate) navigator.vibrate(200);
}

function escribir() {
  let i = 0;
  let speed = 30;
  let cont = document.getElementById("mensaje");

  function write() {
    if (i < texto.length) {
      cont.innerHTML += texto.charAt(i);
      i++;
      setTimeout(write, speed);
    }
  }
  write();
}

function corazones() {
  for (let i = 0; i < 20; i++) {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "💖";
    heart.style.left = Math.random() * 100 + "vw";
    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 3000);
  }
}

function secreto() {
  alert("Eres una persona muy especial 💛 nunca olvides eso");
}
</script>

</body>
</html>
