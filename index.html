<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para ti 💌</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #ff758c, #ff7eb3);
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
}

/* TEXTO INICIAL */
.hint {
  position: absolute;
  top: 20px;
  color: white;
  font-size: 14px;
  opacity: 0.8;
}

/* SOBRE */
.envelope {
  width: 220px;
  height: 140px;
  background: #fff;
  position: relative;
  border-radius: 8px;
  cursor: pointer;
}

.envelope:before {
  content: "";
  position: absolute;
  top: 0;
  border-left: 110px solid transparent;
  border-right: 110px solid transparent;
  border-top: 70px solid #ff4d6d;
  transform-origin: top;
  transition: 0.6s;
}

.open:before {
  transform: rotateX(180deg);
}

/* CARTA */
.card {
  position: absolute;
  width: 90%;
  max-width: 350px;
  max-height: 80vh; /* 👈 CLAVE */
  background: white;
  border-radius: 20px;
  padding: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  display: flex;
  flex-direction: column;
  transform: scale(0);
  transition: 0.4s;
}

.card.show {
  transform: scale(1);
}

/* CONTENIDO SCROLL */
.contenido {
  overflow-y: auto; /* 👈 SCROLL */
  flex: 1;
  padding-right: 5px;
}

/* TEXTO */
.mensaje {
  font-size: 15px;
  line-height: 1.8;
}

.mensaje p {
  text-align: justify; /* 👈 JUSTIFICADO */
  margin-bottom: 16px;
}

/* BOTONES FIJOS */
.botones {
  margin-top: 10px;
}

/* BOTONES */
button {
  margin-top: 8px;
  padding: 10px;
  border: none;
  background: #ff4d6d;
  color: white;
  border-radius: 10px;
  width: 100%;
  cursor: pointer;
}

h1 {
  text-align: center;
  color: #ff4d6d;
}

/* LLUVIA */
.heart {
  position: fixed;
  bottom: -30px;
  animation: subir 4s linear forwards;
  pointer-events: none;
}

@keyframes subir {
  100% {
    transform: translateY(-110vh);
    opacity: 0;
  }
}
</style>
</head>

<body onclick="activarAudio()">

<div class="hint">Toca el sobre 💌</div>

<div class="envelope" onclick="abrir()"></div>

<div class="card" id="card">
  <h1>HAPPY BIRTHDAY 🎂</h1>

  <div class="contenido">
    <div id="mensaje" class="mensaje"></div>
  </div>

  <div class="botones">
    <button onclick="corazones()">💖 Presiona aquí</button>
    <button onclick="secreto()">👀 Mensaje secreto</button>
  </div>
</div>

<audio id="music" preload="auto">
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
const texto = [
  "No puedo explicar cuánto te aprecio. Aunque no es mucho el tiempo de conocerte, ya se te quiere mucho.",
  "Eres una chica increíble, demasiado linda, que en poco tiempo se convirtió en alguien muy especial para mí y para todos los que te rodean.",
  "Has demostrado que hay personas que llegan para traer cambios positivos y llenar la vida de alegría.",
  "Hoy cierras un capítulo y comienzas otro lleno de nuevas oportunidades.",
  "Que este cumpleaños sea el inicio de un año donde descubras más felicidad, recibas abundantes bendiciones y vivas tus sueños con pasión y entusiasmo.",
  "Gracias por existir y por compartir tu luz con quienes te rodean.",
  "Disfruta tu día al máximo, porque te lo mereces más que nadie. Te mando un fuerte abrazo a la distancia 💛"
];

// AUDIO
function activarAudio() {
  let audio = document.getElementById("music");
  audio.play().catch(()=>{});
}

// ABRIR
function abrir() {
  document.querySelector(".envelope").classList.add("open");
  document.getElementById("card").classList.add("show");

  escribir();

  let audio = document.getElementById("music");
  audio.currentTime = 0;
  audio.play().catch(()=>{});
}

// TEXTO
function escribir() {
  const cont = document.getElementById("mensaje");
  cont.innerHTML = "";

  texto.forEach(t => {
    let p = document.createElement("p");
    p.textContent = t;
    cont.appendChild(p);
  });
}

// LLUVIA
let lluviaActiva = false;
function corazones() {
  if (lluviaActiva) return;
  lluviaActiva = true;

  setInterval(() => {
    let el = document.createElement("div");
    el.className = "heart";
    el.innerHTML = Math.random() > 0.5 ? "💖" : "🎂";
    el.style.left = Math.random() * 100 + "vw";
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 4000);
  }, 250);
}

// SECRETO
function secreto() {
  alert("Que nunca muera tu forma tan linda de ver la vida 💛");
}
</script>

</body>
</html>
