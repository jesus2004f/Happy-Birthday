<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para ti 💌</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #ff758c, #ff7eb3);
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
}

/* TEXTO INICIAL */
.hint {
  position: absolute;
  top: 20px;
  color: white;
  font-size: 14px;
  opacity: 0.8;
}

/* SOBRE */
.envelope {
  width: 220px;
  height: 140px;
  background: #fff;
  position: relative;
  border-radius: 8px;
  cursor: pointer;
}

.envelope:before {
  content: "";
  position: absolute;
  top: 0;
  border-left: 110px solid transparent;
  border-right: 110px solid transparent;
  border-top: 70px solid #ff4d6d;
  transform-origin: top;
  transition: 0.6s;
}

.open:before {
  transform: rotateX(180deg);
}

/* CARTA */
.card {
  position: absolute;
  width: 85%;
  max-width: 350px;
  background: white;
  border-radius: 20px;
  padding: 20px;
  text-align: center;
  transform: scale(0);
  transition: 0.4s;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

.card.show {
  transform: scale(1);
}

h1 {
  color: #ff4d6d;
}

/* TEXTO PREMIUM CENTRADO */
.mensaje {
  font-size: 15px;
  line-height: 1.8;
  text-align: center;
  margin-top: 10px;
}

.mensaje p {
  margin-bottom: 16px;
  opacity: 0;
  transform: translateY(10px);
  animation: aparecer 0.6s ease forwards;
}

@keyframes aparecer {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* BOTONES */
button {
  margin-top: 10px;
  padding: 10px;
  border: none;
  background: #ff4d6d;
  color: white;
  border-radius: 10px;
  width: 100%;
  cursor: pointer;
}

/* CORAZONES */
.heart {
  position: fixed;
  bottom: 0;
  font-size: 20px;
  animation: subir 3s linear forwards;
}

@keyframes subir {
  to {
    transform: translateY(-100vh);
    opacity: 0;
  }
}
</style>
</head>

<body onclick="activarAudio()">

<div class="hint">Toca el sobre 💌</div>

<div class="envelope" onclick="abrir()"></div>

<div class="card" id="card">
  <h1>Feliz cumpleaños 🎂</h1>

  <div id="mensaje" class="mensaje"></div>

  <button onclick="corazones()">💖 Presiona aquí</button>
  <button onclick="secreto()">👀 Mensaje secreto</button>
</div>

<audio id="music" preload="auto">
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
const nombre = "Carmen";

const texto = [
  "Hoy cierras un capítulo más y comienzas uno nuevo en tu vida.",
  "No importa la cantidad de años que cumplas, sino la calidad con la que vives.",
  "No apresures el tiempo, disfruta cada momento.",
  "Feliz vuelta al sol 🌞",
  "Hoy celebras tus 18 años 🎂",
  "Te mando un fuerte abrazo a la distancia 💛"
];

// ACTIVAR AUDIO (clave en celular)
function activarAudio() {
  let audio = document.getElementById("music");
  audio.play().catch(()=>{});
}

// ABRIR CARTA
function abrir() {
  document.querySelector(".envelope").classList.add("open");
  document.getElementById("card").classList.add("show");

  escribir();

  let audio = document.getElementById("music");
  audio.currentTime = 0;
  audio.volume = 0.8;

  audio.play().catch(()=>{});

  if (navigator.vibrate) navigator.vibrate(200);
}

// TEXTO PREMIUM ANIMADO
function escribir() {
  const cont = document.getElementById("mensaje");
  cont.innerHTML = "";

  let i = 0;

  function escribirParrafo() {
    if (i < texto.length) {
      let p = document.createElement("p");
      cont.appendChild(p);

      let textoActual = texto[i];
      let j = 0;

      function escribirLetra() {
        if (j < textoActual.length) {
          p.innerHTML += textoActual.charAt(j);
          j++;
          setTimeout(escribirLetra, 25);
        } else {
          i++;
          setTimeout(escribirParrafo, 400);
        }
      }

      escribirLetra();
    }
  }

  escribirParrafo();
}

// CORAZONES
function corazones() {
  for (let i = 0; i < 20; i++) {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "💖";
    heart.style.left = Math.random() * 100 + "vw";
    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 3000);
  }
}

// MENSAJE SECRETO
function secreto() {
  alert("Eres una persona muy especial 💛 nunca cambies");
}
</script>

</body>
</html>
