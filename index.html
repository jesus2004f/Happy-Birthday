<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para ti 💌</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #ff758c, #ff7eb3);
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
}

/* TEXTO INICIAL */
.hint {
  position: absolute;
  top: 20px;
  color: white;
  font-size: 14px;
  opacity: 0.8;
}

/* SOBRE */
.envelope {
  width: 220px;
  height: 140px;
  background: #fff;
  position: relative;
  border-radius: 8px;
  cursor: pointer;
}

.envelope:before {
  content: "";
  position: absolute;
  top: 0;
  border-left: 110px solid transparent;
  border-right: 110px solid transparent;
  border-top: 70px solid #ff4d6d;
  transform-origin: top;
  transition: 0.6s;
}

.open:before {
  transform: rotateX(180deg);
}

/* CARTA */
.card {
  position: absolute;
  width: 85%;
  max-width: 350px;
  background: white;
  border-radius: 20px;
  padding: 20px;
  text-align: center;
  transform: scale(0);
  transition: 0.4s;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

.card.show {
  transform: scale(1);
}

h1 {
  color: #ff4d6d;
}

/* TEXTO CENTRADO */
.mensaje {
  font-size: 15px;
  line-height: 1.8;
  width: 100%;
}

.mensaje p {
  text-align: center;
  margin: 0 auto 16px auto;
  max-width: 85%;
  font-weight: 500;
  letter-spacing: 0.3px;
  opacity: 0;
  transform: translateY(10px);
  animation: aparecer 0.6s ease forwards;
}

@keyframes aparecer {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* BOTONES */
button {
  margin-top: 10px;
  padding: 10px;
  border: none;
  background: #ff4d6d;
  color: white;
  border-radius: 10px;
  width: 100%;
  cursor: pointer;
}

/* LLUVIA */
.heart {
  position: fixed;
  bottom: -30px;
  animation: subir 4s linear forwards;
  pointer-events: none;
}

@keyframes subir {
  0% {
    transform: translateY(0);
    opacity: 1;
  }
  100% {
    transform: translateY(-110vh);
    opacity: 0;
  }
}
</style>
</head>

<body onclick="activarAudio()">

<div class="hint">Toca el sobre 💌</div>

<div class="envelope" onclick="abrir()"></div>

<div class="card" id="card">
  <h1>HAPPY BIRTHDAY 🎂</h1>

  <div id="mensaje" class="mensaje"></div>

  <button onclick="corazones()">💖 Presiona aquí</button>
  <button onclick="secreto()">👀 Mensaje secreto</button>
</div>

<audio id="music" preload="auto">
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
const nombre = "Carmen";

const texto = [
  "No puedo explicar cuánto te aprecio. Aunque no es mucho el tiempo de conocerte, ya se te quiere mucho.",
  "Eres una chica increíble, demasiado linda, que en poco tiempo se convirtió en alguien muy especial para mí y para todos los que te rodean. Has demostrado que hay personas que llegan para traer cambios positivos y llenar la vida de alegría.",
  "Hoy cierras un capítulo y comienzas otro lleno de nuevas oportunidades.",
  "Que este cumpleaños sea el inicio de un año donde descubras más felicidad, recibas abundantes bendiciones y vivas tus sueños con pasión y entusiasmo.",
  "Gracias por existir y por compartir tu luz con quienes te rodean.",
  "Disfruta tu día al máximo, porque te lo mereces más que nadie. Te mando un fuerte abrazo a la distancia 💛"
];

// ACTIVAR AUDIO
function activarAudio() {
  let audio = document.getElementById("music");
  audio.play().catch(()=>{});
}

// ABRIR CARTA
function abrir() {
  document.querySelector(".envelope").classList.add("open");
  document.getElementById("card").classList.add("show");

  escribir();

  let audio = document.getElementById("music");
  audio.currentTime = 0;
  audio.volume = 0.8;
  audio.play().catch(()=>{});

  if (navigator.vibrate) navigator.vibrate(200);
}

// TEXTO ANIMADO
function escribir() {
  const cont = document.getElementById("mensaje");
  cont.innerHTML = "";

  let i = 0;

  function escribirParrafo() {
    if (i < texto.length) {
      let p = document.createElement("p");
      cont.appendChild(p);

      let textoActual = texto[i];
      let j = 0;

      function escribirLetra() {
        if (j < textoActual.length) {
          p.innerHTML += textoActual.charAt(j);
          j++;
          setTimeout(escribirLetra, 25);
        } else {
          i++;
          setTimeout(escribirParrafo, 400);
        }
      }

      escribirLetra();
    }
  }

  escribirParrafo();
}

// LLUVIA 💖🎂
let lluviaActiva = false;

function corazones() {
  if (lluviaActiva) return;
  lluviaActiva = true;

  setInterval(() => {
    let elemento = document.createElement("div");
    elemento.className = "heart";

    elemento.innerHTML = Math.random() > 0.5 ? "💖" : "🎂";
    elemento.style.left = Math.random() * 100 + "vw";
    elemento.style.fontSize = (Math.random() * 15 + 15) + "px";

    document.body.appendChild(elemento);

    setTimeout(() => elemento.remove(), 4000);
  }, 250);
}

// MENSAJE SECRETO
function secreto() {
  alert("Que nunca muera tu forma tan linda de ver la vida. Que siempre brilles más que el sol y que nunca se apague esa sonrisa. Nunca cambies 💛");
}
</script>

</body>
</html>
