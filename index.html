<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para ti 💌</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
  background: linear-gradient(135deg, #a1c4fd, #c2e9fb);
}

/* ☁️ NUBES */
.cloud {
  position: absolute;
  background: white;
  border-radius: 50px;
  opacity: 0.6;
}
.cloud::before,
.cloud::after {
  content: "";
  position: absolute;
  background: white;
  border-radius: 50%;
}
.cloud1 {
  width: 120px;
  height: 60px;
  top: 20%;
  left: -150px;
  animation: moveClouds 40s linear infinite;
}
.cloud1::before {
  width: 70px;
  height: 70px;
  top: -30px;
  left: 10px;
}
.cloud1::after {
  width: 80px;
  height: 80px;
  top: -20px;
  right: 10px;
}
.cloud2 {
  width: 150px;
  height: 70px;
  top: 60%;
  left: -200px;
  animation: moveClouds 55s linear infinite;
}
.cloud2::before {
  width: 80px;
  height: 80px;
  top: -30px;
  left: 20px;
}
.cloud2::after {
  width: 90px;
  height: 90px;
  top: -25px;
  right: 20px;
}
@keyframes moveClouds {
  to { transform: translateX(120vw); }
}

/* TEXTO */
.hint {
  position: absolute;
  top: 20px;
  color: white;
  font-size: 14px;
  opacity: 0.9;
}

/* SOBRE */
.envelope {
  width: 220px;
  height: 140px;
  background: #fff;
  position: relative;
  border-radius: 8px;
  cursor: pointer;
  z-index: 2;
}
.envelope:before {
  content: "";
  position: absolute;
  border-left: 110px solid transparent;
  border-right: 110px solid transparent;
  border-top: 70px solid #4da6ff;
  transform-origin: top;
  transition: 0.6s;
}
.open:before {
  transform: rotateX(180deg);
}

/* CARTA */
.card {
  position: absolute;
  width: 90%;
  max-width: 350px;
  max-height: 80vh;
  background: white;
  border-radius: 20px;
  padding: 20px;
  display: flex;
  flex-direction: column;
  transform: scale(0);
  transition: 0.4s;
  z-index: 2;
}
.card.show {
  transform: scale(1);
}

/* CONTENIDO */
.contenido {
  overflow-y: auto;
  flex: 1;
}
.mensaje p {
  text-align: justify;
  margin-bottom: 16px;
  font-size: 15px;
  line-height: 1.8;
}

/* BOTONES */
button {
  margin-top: 8px;
  padding: 10px;
  border: none;
  background: #4da6ff;
  color: white;
  border-radius: 10px;
  width: 100%;
}

h1 {
  text-align: center;
  color: #4da6ff;
}

/* LLUVIA ENCIMA */
.heart {
  position: fixed;
  bottom: -30px;
  animation: subir 4s linear forwards;
  pointer-events: none;
  z-index: 9999; /* 👈 AHORA ENCIMA */
}

@keyframes subir {
  to {
    transform: translateY(-110vh);
    opacity: 0;
  }
}
</style>
</head>

<body onclick="activarAudio()">

<div class="cloud cloud1"></div>
<div class="cloud cloud2"></div>

<div class="hint">Toca el sobre 💌</div>

<div class="envelope" onclick="abrir()"></div>

<div class="card" id="card">
  <h1>HAPPY BIRTHDAY 🎂</h1>

  <div class="contenido">
    <div id="mensaje" class="mensaje"></div>
  </div>

  <button onclick="corazones()">💖 Presiona aquí</button>
  <button onclick="secreto()">👀 Mensaje secreto</button>
</div>

<audio id="music" preload="auto">
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
const texto = [
  "No puedo explicar cuánto te aprecio. Aunque no es mucho el tiempo de conocerte, déjame decirte que ya se te quiere mucho. 🫶",
  "Eres una chica increíble y, por supuesto, demasiado linda. En poco tiempo te has convertido en alguien muy especial para mí y para todos los que te rodean. 🌟",
  "Has demostrado que hay personas que llegan para traer cambios positivos y llenar la vida de alegría. ✨",
  "Hoy cierras un capítulo y comienzas otro lleno de nuevas oportunidades. 📖",
  "Que este cumpleaños sea el inicio de un año donde descubras más felicidad, recibas abundantes bendiciones y vivas tus sueños con pasión y entusiasmo. 🎂",
  "Gracias por existir y por compartir tu luz con quienes te rodean. 💫",
  "Disfruta tu día al máximo, porque te lo mereces más que nadie. Te mando un fuerte abrazo a la distancia. 🤗🫶💖"
];

function activarAudio() {
  document.getElementById("music").play().catch(()=>{});
}

function abrir() {
  document.querySelector(".envelope").classList.add("open");
  document.getElementById("card").classList.add("show");

  let cont = document.getElementById("mensaje");
  cont.innerHTML = "";

  texto.forEach(t => {
    let p = document.createElement("p");
    p.textContent = t;
    cont.appendChild(p);
  });

  let audio = document.getElementById("music");
  audio.currentTime = 0;
  audio.play().catch(()=>{});
}

let lluviaActiva = false;
function corazones() {
  if (lluviaActiva) return;
  lluviaActiva = true;

  setInterval(() => {
    let el = document.createElement("div");
    el.className = "heart";
    el.innerHTML = Math.random() > 0.5 ? "💖" : "🎂";
    el.style.left = Math.random() * 100 + "vw";
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 4000);
  }, 250);
}

function secreto() {
  alert("Eres una persona muy especial, nunca cambies ❤️");
}
</script>

</body>
</html>
